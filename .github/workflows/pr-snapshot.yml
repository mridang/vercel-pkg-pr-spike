name: pr-snapshot

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable corepack pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.2 --activate
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Publish snapshot to Vercel Blob
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.head_ref || github.ref_name }}
          PUBLIC_REGISTRY_URL: ${{ vars.PUBLIC_REGISTRY_URL }}
        run: pnpm tsx scripts/publish-snapshot.ts

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          REF: ${{ github.head_ref }}
          SHA: ${{ github.sha }}
        with:
          script: |
            const sha = process.env.SHA.slice(0, 7);
            const ref = process.env.REF.replace(/[^a-z0-9-]/gi, '-').toLowerCase();
            const registry = process.env.PUBLIC_REGISTRY_URL || `https://<your-app>-git-${ref}-<team>.vercel.app`;
            const body = [
              `### Snapshot \`0.0.0-sha-${sha}\` published`,
              ``,
              '```sh',
              `npm install --registry=${registry} \\`,
              `  @mridang/foo@0.0.0-sha-${sha} \\`,
              `  @mridang/bar@0.0.0-sha-${sha} \\`,
              `  @mridang/baz@0.0.0-sha-${sha}`,
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
