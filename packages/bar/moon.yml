id: "bar"
language: "typescript"
layer: "library"
dependsOn:
  - "foo"

tasks:
  build:
    command: "corepack pnpm run build"
    deps:
      - "foo:build"
    outputs:
      - "dist/**/*"

  pack:
    command: "corepack pnpm pack --pack-destination=$workspaceRoot/.local-pack"
    deps:
      - "~:build"
